name = "mcpkit-api"
main = "src/workers/index.ts"
compatibility_date = "2026-05-13"
compatibility_flags = ["nodejs_compat"]

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "mcpkit-db"
database_id = "local_dev"

# KV Namespace for sessions and cache  
[[kv_namespaces]]
binding = "CACHE"
id = "local_cache"

# Environment variables (non-sensitive)
[vars]
ENV = "development"
